<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "シングルピッキングリスト", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	倉庫別／ルート別／納品先別／得意先別のピッキング用として使用します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	ピッキング数は商品の単位設定に応じて単位毎に表示します。\
<li>	売上基準が出荷・売上同時計上の場合、受注伝票右側に「*」が表示されます。\
<li>	受注時に指定したロット、管理日付を表示します。\
<li>	管理日付の管理を行う商品に対して、出荷可能な日付を出荷予定日と得意先別賞味期限マスタの最低保証期間（未設定の場合商品マスタ）より算出します。その際、ユーザー情報管理テーブルの「両端片端区分」を考慮します。算出日付＞受注時指定管理日付 の場合は算出日付を参考表示します。\
<li>	ロット逆転防止指定の得意先には、最新引当管理日付＞受注時指定管理日付の場合に最新引当管理日付を参考表示します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	最終頁には［ＥＮＤ］を印字しています。\
<li>	出力区分は、0:受注/受発注、1:通常（受注計上からの登録分）、 2:受発注（受発注計上からの登録分）より選択できます。\
<li>	預り区分は、0:通常/預出庫、1:通常、2:預出庫、3:預売上、4:全件より選択出来ます。\
<li>	引当運用を行なう場合、引当区分を「1：引当済みのみ」とすることで未引当受注データをリスト対象外とすることができます。\
<li>	受注伝票や移動依頼伝票にて入力されたロット情報が出力されます。\
<li>	管理日付の右側に※が印字されている明細は、伝票入力時に入力された管理日付が表示されています。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
