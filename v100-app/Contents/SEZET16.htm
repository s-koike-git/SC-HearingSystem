◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />	【製造指示入力（複数版）】\
<li>	複数の構成品から、製品・半製品が複数できる連産品の入力に対応します。\
<li>	当画面では、「製品・半製品」を入力します。\
<br />\
<br />	【製造指示入力（複数版）（構成品）】\
<li>	「製造指示入力（複数版）」画面から呼び出されます。\
<li>	連産品の製造指示における構成品の入力を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />	【製造指示入力（複数版）】\
<li>	事前に登録した製造パターンを指定し、登録済みの製品・半製品の一覧を明細に展開します。\
<li>	構成品の入力は、ツールバー「構成品情報」から起動される「製造指示入力（複数版）（構成品）」画面にて行います。\
<li>	サブ画面で中間親情報の確認が可能です。\
<br />\
<br />	【製造指示入力（複数版）（構成品）】\
<li>	「製造指示入力（複数版）」画面で指定した製品・半製品の製造に必要な構成品が明細に展開されます。構成品の追加・修正・削除や所要量の修正を行うことができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />	【製造指示入力（複数版）】\
<li>	当画面にてデータを登録する際は、必ず「製造指示入力（複数版）（構成品）」で構成品の情報が登録されている必要があります。また、構成品情報を登録後、当画面にて入力値を変更した場合は、再度「製造指示入力（複数版）（構成品）」の情報を登録する必要があります。\
<br />\
<br />	【製造指示入力（複数版）（構成品）】\
<li>	構成に含まれていない構成品を追加することが可能です。追加した構成品の明細にて「対象製品・半製品コード」を指定することで、　特定の製品・半製品のみに追加することが可能です。空白とした場合、「製造指示入力（複数版）」にて入力されている製品・半製品の全てで使用することとなり、それぞれの在庫単位数量にて構成品使用数を按分します。\
<br /><br />\
</ul></td></tr>\
