<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "得意先詳細登録", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	得意先情報の詳細を登録／修正／削除できます。\
<br />\
<br />【基本取引情報】\
<li>	設定内容を基本情報と債権管理、オンライン情報、物流情報、SC会計連携の5種に大別しタブで切り替えます。\
<li>	他の得意先を参照して設定したい場合は、参照先の得意先を画面表示した後、矢印キーなどで得意先コードへカーソルを移動させ、新規コードを入力します。\
<br />\
<br />【債権管理情報】\
<li>	債権管理情報を設定します。\
<br />\
<br />【オンライン情報】\
<li>	EOS受注データ連携で使用するオンライン情報を設定します。\
<li>	EOS取込時の変換時に使用する社コード、店コード、部門コードを設定します。\
<br />\
<br />【物流情報】\
<li>	物流情報を設定します。\
<br />\
<br />【汎用項目】\
<li>	汎用項目を入力します。\
<br />\
<br />【SC会計連携】\
<li>	SC会計連携機能を使用する際に、会計側の取引先とデータ連携を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【基本取引情報】\
<li>	得意先先担当者の情報として、所属部署、役職、携帯番号、メールアドレスの設定が可能です。\
<li>	「得意先別取引状況照会」で検索できるように営業アススタントの設定が可能です。\
<li>	計上時の商品検索で使用する検索方法の初期値を設定できます。\
<br />	　①商品マスタ：商品マスタに登録されている商品一覧を表示\
<br />	　②契約単価：契約単価が登録されている商品のみ表示\
<br />	　③取引履歴：取引件数の多い商品を表示。\
<br />	　（履歴検索期間にて取引期間を設定できます）\
<br />\
<br />【債権管理情報】\
<li>	回収条件を設定できます。回収予定表・売掛個別消込を運用する場合は必ず設定してください。\
<li>	取引発生している場合は請求に関する情報・回収に関する情報の変更はできません。請求締日変更で対応して下さい。\
<li>	請求親子を設定した場合に親子同期を要する項目（請求関連項目、回収項目、消費税、債権管理部門、消込区分)があります。当画面でも子での変更不可制御や親変更時の子の自動変更などの制御が発生します。\
<li>	請求書の宛先を別途指定できます。省略時は基本取引情報の得意先名称、郵便番号、住所を使用します。\
<br />\
<br />【オンライン情報】\
<li>	倉庫コードは、EOS受注データ作成時の出荷倉庫、納品先コードは、受注計上時の初期値となります。\
<br />\
<br />【物流情報】\
<li>	運送会社：事前に運送会社登録が必要です。受注計上での初期値となります。\
<li>	地域／市町村：事前に摘要マスタ登録が必要です。現在未使用です。\
<br />\
<br />【汎用項目】\
<li>	「マスタ汎用設定登録」で設定した汎用項目に対して入力を行うことができます。汎用文字列・汎用数値・汎用日付に各10項目ずつ入力が可能です。\
<li>	「マスタ汎用設定登録」の設定に従い、入力時チェックや入力可能文字制御を行います。\
<br />\
<br />【SC会計連携】\
<li>	会計取引先コード：会計側の取引先を指定します。会計側に存在しないデータをセットした場合は、会計取引先マスタにデータが新規で作成されます。\
<li>	マスタ連携備考：備考を記入します。会計側へ連携はされません。\
<li>	Core会計ポスグレ版でデータベースがPostgreSQLに変更されたことに伴い、Core会計ポスグレ版にて用意されている外部連携WebAPIを用いてデータ参照や更新を行います。\
<li>	登録時はSC側の連携マスタのデータと共にCore会計ポスグレ版のマスタにも登録が同時に行われます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【基本取引情報】\
<li>	単価区分は　1:商品ﾏｽﾀ販売単価 　2:商品ﾏｽﾀ上代×得意先ﾗﾝｸ別掛率　3:商品ﾏｽﾀ上代×商品分類別掛率　\
<li>	単価ランクは取引単価を得意先ﾗﾝｸ別掛率で使用する場合に設定します。（名称マスタへの事前登録）\
<li>	債権管理部門は「請求書発行処理を部門別に行う」場合や「・ 売掛や請求一覧を部門で括っておきたい」場合に各部門に設定します。部門管理なしのシステム設定では表示されません。共通部門で運用も可能です。（ユーザーガイドを参照下さい）\
<li>	ロット逆転防止機能の最新管理日付は出荷/出荷売上計上で入力した日付がマスタに記録されます。売上一括処理は機能対象外です。\
<li>	単一ロット管理区分が有効なのは出荷/出荷売上計上です。売上一括処理は機能対象外です。\
<br />\
<br />【債権管理情報】\
<li>	請求書の宛先は、基本情報からのコピー機能があります。参照作成が可能です。\
<li>	請求送付先の郵便番号、住所、宛名１、２の項目に値が設定されている場合に適用されますので、必要事項は全て設定してください。TEL、FAX、担当者、敬称は未使用です。\
<li>	得意先の計上基準の設定により、計上時に売上予定日（売上日）の算出を行います。検収リードタイムは、納期起算で売上予定日（売上日）の算出に使用します。（納期/検収基準の場合）\
<br />\
<br />【オンライン情報】\
<li>	オンライン情報は納品書の見出情報にも使用されます。\
<br />\
<br />【汎用項目】\
<li>	「マスタ汎用設定登録」で対象マスタの利用区分が利用しないになっている場合や対象マスタに対する設定がない場合は表示されません。\
<br />\
<br />【SC会計連携】\
<li>	ユーザー情報管理テーブル登録の「SC会計マスタ連携」を「1:する」とした場合表示されます。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
