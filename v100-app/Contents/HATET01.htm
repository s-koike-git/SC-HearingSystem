<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "発注計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	発注情報を入力／修正／削除します。\
<li>	在庫商品の場合には発注残および入荷残を加算しています。\
<li>	過去発注を参照して登録したい場合は参照発注№を直接入力するか、発注一覧ウィンドウより検索して画面表示することができます。\
<li>	確認ウィンドウで、即時伝票（注文書）発行が可能です。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<li>	登録時や伝票参照時に「証憑保管情報登録」をリンク起動し、登録した伝票に利用した受領文書の情報を登録・確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。また、過去の発注を参照することができます。\
<li>	各種コードは検索ウィンドウからの検索入力が可能です。\
<li>	マスタの設定により、仕入先及び商品の名称等手入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	発注単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	仕入先別商品別の契約単価が参照可能です。\
<li>	ユーザー情報管理テーブルの指定により、契約単価の自動作成が可能です。\
<li>	伝票登録後、または登録済の伝票を表示している状態での証憑情報ボタン押下により「証憑保管情報登録」をリンク起動することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	在庫照会ウィンドウに表示される現在庫は、伝票日付に関係なく、入出荷計上済のものを対象とした在庫です。\
<li>	ユーザー情報管理テーブルの荷姿初期値運用で「購買荷姿：1：する」\
とした場合、「単価変更入力」で初期表示させる荷姿を設定する事が\
出来ます。（設定を行なわない場合は商品詳細登録で登録されている\
単位が表示されます）\
<li>	仕入先別の検収リードタイムの設定より仕入予定日を自動表示します。指定納期＋検収リードタイム指定納期<=仕入予定日の条件で変更可です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
