<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "受注計上（Core販売）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注情報を入力／修正／削除します。\
<li>	スーパーカクテルCore販売ライセンスで利用可能です。\
<li>	預り取引・引当・店・帳合先に非対応です。\
<li>	明細項目の倉庫・納期・出荷予定日・売上予定日・ルート・受注ロット・出荷バッチNo.に非対応です。\
<li>	登録時や伝票参照時に「証憑保管情報登録」をリンク起動し、登録した伝票に利用した受領文書の情報を登録・確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウからの検索入力が可能です。\
<li>	マスタの設定により、得意先及び納品先、商品の名称等手入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	受注単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	得意先別商品別の契約単価が参照可能です。\
<li>	ユーザー情報管理テーブルの設定により、契約単価の自動作成が可能です。\
<li>	商品詳細登録に登録されている複数荷姿毎の数量を登録できるサブ画面を表示させることができます。\
<li>	伝票登録後、または登録済の伝票を表示している状態での証憑情報ボタン押下により「証憑保管情報登録」をリンク起動することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	在庫照会ウィンドウで表示される現在庫は、伝票日付に関係なく、入出荷計上済のものを対象とした在庫です。\
<li>	オンライン情報ウィンドウで表示される内容は、得意先店毎に登録されている内容です。\
<li>	得意先別の計上基準（出荷基準or検収基準、検収LT）の設定より売上予定日を自動表示します。（日付変更可）出荷基準の場合：出荷日、検収基準の場合：指定納品＋検収LT\
<li>	売上予定日は、売上一括計上時に、出荷同時売上の伝票でも、出荷日と売上日を別日付にて計上するために使用します。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
