<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\

◆◇◆◇　処理概要　◇◆◇◆\

<tr><td class='t1'>\
<ul>\
<li>	計上画面で使用する伝票番号の運用形態(自動採番／番号手打)や番号を管理します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票番号手打の場合は、各計上画面で\
<br />	　起動時は左記番号＋１が表示され、\
<br />	　手入力を行い、\
<br />	　２枚めは１枚目の番号に１加算して表示\
<br />	という動作をしますが、左記番号には一切更新されません。また、同時\
に複数端末から同一伝票番号が入力された場合に遅い方が処理エ\
ラーとされます。事前に原票ナンバリング等で利用者による管理が必要です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\

<li>	製造業務を行う場合は、製造指示入力で「910」、完成計上で「920」、完成計上（移動）で「921」の種別を設定しておく必要があります。\
