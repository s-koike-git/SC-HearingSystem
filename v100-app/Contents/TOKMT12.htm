◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	得意先／店との間で取り決められた商品単価（契約単価）を登録します。\
<li>	単価利用区分が「バラ」の場合、単位別の設定単価は単位当り\
の数量単価（単位(1)に対する単価）です。\
<li>	単価利用区分が「荷姿」の場合、単位別の設定単価は単位当り\
の荷姿単価（各単位に対する単価）です。\
<li>	基準数量毎に数量別単価を設定することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	価格改定に備え事前設定できる様に有効開始日付と各単価を設定す\
る形式です。当画面では日付昇順チェックが行われます。\
<li>	通常単価／特売単価毎の契約単価が設定できます。\
<li>	伝票原価／伝票売価の設定が出来ます。また、リベート計算用として、\
リベート単価／リベート率の設定が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

しておく必要があります。\
<li>	ユーザー情報管理テーブルの得意先契約単価自動作成区分が「1：自動生成する」としていた場合、受注／売上計上にて契約単価を自動で作成する機能があります。（特売時は、自動作成しません）\
