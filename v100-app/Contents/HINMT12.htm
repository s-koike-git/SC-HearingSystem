function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "構成マスタ登録", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	加工品の構成品情報を登録します。\
<li>	構成品は最大５０行迄登録可能です。\
<li>	多階層の加工商品の設定が可能です。下位有無区分により設定します。（無段階）\
<li>	加工商品の配合数に対する構成品の所要数の設定が可能です。（１カマ、１バッチなど）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	明細部に同じ構成品コードを複数設定する事はできません。\
<li>	歩留等の設定ができます。（％、定数選択可）\
<li>	構成要素の完成計上での自動払出しを行うか行われないかの設定が出来ます。\
<li>	既存データを参照して構成マスタを作成する事が出来ます。既存版数より新たな版数を作成するのに適しています。\
<li>	明細部の構成品単位は、単位変換マスタを合わせて在庫単位でない単位設定が可能です。\
<li>	既存の構成情報をツリー表示で検索できます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	構成マスタは製品・半製品コード、製造ラインコード、開始有効日付で一意となります。版数もこれらの項目をキーに管理されます。\
<li>	半製品の場合、複数工場での構成登録はできません。複数工場で同一半製品の製造がある場合は、半製品コードを分けて頂く運用が必要です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
