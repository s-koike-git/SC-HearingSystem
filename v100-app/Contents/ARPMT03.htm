<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	エアレポの配信先をAirRepo連携配信先設定マスタに登録します。\
<li>	エアレポにもAPI経由で連携できるようにします。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	帳票ごとに配信先参照マスタを設定し、参照マスタに登録済の配信先コード(各マスタのメインキーコード)のみ登録可能です。\
<li>	マスタ参照なしも設定可能です。\
<li>	TO/CC/BCCメールアドレスは各10件まで登録可能です。サブ画面で入力します。\
<li>	一般ユーザーメールアドレスは2件まで登録可能です。サブ画面で入力します。\
<li>	エアレポAPI連携の対象はAirRepo連携配信先設定マスタに登録されている連携区分が未連携の配信先が対象となります。\
<li>	エアレポ連携に失敗した場合、エラー内容をログファイルで確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	エアレポAPI連携時、連携対象の配信先情報を抽出しCSVファイルを作成します。CSVファイルを出力するフォルダをｃonfigファイルに設定する必要があります。\
<br /><br />\
</ul></td></tr>\

win.showCenter();
