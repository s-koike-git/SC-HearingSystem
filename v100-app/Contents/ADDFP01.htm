<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	日本郵便が提供している郵便番号データファイル（CSV形式）を、SC販売の郵便番号マスタへ取り込みます。\
<li>	取込んだ郵便番号データは、得意先詳細登録の得意先の郵便番号入力時に、得意先住所を自動表示する際に使用します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	対象ファイルにて、日本郵便より提供される郵便番号ファイルの種類を指定します。\
<li>	CSVデータを保存しているパスを指定し実行すると郵便住所マスタに格納されます。\
<li>	郵便住所マスタに格納されているデータがある場合は、対象ファイル毎に一旦削除し再作成します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	取込対象となる郵便番号データファイルは、日本郵便ホームページよりダウンロードできます。（http://www.post.japanpost.jp/index.html）ダウンロードは手動で行って下さい。\
<li>	対象ファイルは「住所の郵便番号」と「事業所の個別郵便番号」です。\
<li>	提供されている郵便番号データファイルには、差分データや都道府県別がありますが、必ず「全国一括」版を使用して下さい。\
<br /><br />\
