◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	棚卸ロス等完成計上の使用以外で原材料費として原価加算（配賦）したい場合に登録します。\
<li>	見出部に工場を入力し、配賦方法により配賦先ラインおよび製品・半製品を指定します。\
<li>	明細に配賦する原材料・半製品および金額を指定します。\
<li>	数量を入力しますが在庫更新は一切行いません。\
<li>	実際の配賦処理は原価計算にて行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	該当月度の生産が全くないラインは指定できません。\
<li>	配賦先は当月生産のあった製品・半製品に対して行います。\
<li>	見出部配賦先の指定方法は３パターンあります。\
<br />	　①ライン、製品・半製品をともに入力\
<br />	　②ラインのみ入力（製品・半製品は未入力）\
<br />	　③ライン、製品・半製品ともに未入力\
<br />	これにより原価計算にて配賦対象が変わります。\
<br />	　①指定した製品・半製品に直接賦課します。\
<br />	　②ライン内で使用実績のある製品・半製品に対して配賦します。\
<br />	　③工場内で使用実績のある製品・半製品に対して配賦します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	原価計算時の配賦基準は製品における原料使用比率を使用します。\
<br /><br />\
