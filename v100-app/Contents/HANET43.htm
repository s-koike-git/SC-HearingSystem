<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "直送売上計上（Core販売）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	直送売上情報を入力／修正／削除します。\
<li>	自社在庫より出荷せず仕入先より直送する場合には当処理で行います。\
<li>	売上・仕入情報を一度に作成します。\
<li>	直送受注データをもとに、直送売上実績を入力します。また、単独での直送売上入力も可能です。\
<li>	スーパーカクテルCore 販売ライセンスで利用可能です。\
<li>	店・帳合先に非対応です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	マスタの設定により、得意先及び納品先、仕入先、商品等の名称が手入力可能です。\
<li>	販売及び仕入単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	確認ウィンドウで、即時伝票発行が可能です。\
<li>	得意先別商品別の契約単価が参照可能です。ユーザー情報管理テーブルの設定により、契約単価の自動作成が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	直送受注データをもとにした場合、分納が可能です。\
<li>	オンライン情報ウィンドウで表示される内容は、得意先店毎に登録されている内容です。\
<li>	売上日と仕入日を別日付（仕入日<=売上日）で計上することができます。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
