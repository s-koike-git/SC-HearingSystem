function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "得意先別取引状況照会", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	得意先に取引状況を確認します。得意先からの問合せに対して、迅速な対応と、対応履歴の管理が可能。\
<li>	各伝票（受注・出荷・売上・入金）の検索および内容の確認、得意先からの問合せ内容とその状況の確認を行います。\
<li>	伝票に関しては、伝票内容の照会だけでなく、修正および参照作成が可能。\
<li>	e-mail項目、得意先HPのボタンを押下すると、それぞれメーラー、ブラウザが起動します。また地図表示ボタン押下で、得意先住所をもとにインターネット地図表示サービスを利用した地図表示が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	主な絞り込み条件\
<br />対象伝票：受注、出荷、売上、入金\
<br />伝票番号：自社伝票№又は相手伝票番号\
<br />商品コード：該当商品を含む伝票のみ表示\
<br />預り区分：通常/預売上、通常、預売上、預出庫、全件\
<br />状態区分：未出荷・未売上\
<br />要確認：確認が必要な伝票のみ表示\
<br />引当区分：受注伝票にて未引当伝票のみ表示\
<br />備考内容のあいまい検索\
<li>	明細表示順は伝票日付、処理日付、伝票№、相手先伝票№より指定（降順表示）\
<li>	明細行にて、対象伝票の計上画面の起動が可能（修正、参照作成）\
<li>	得意先との問合せ内容を直近5明細を表示します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	要確認：各計上にて指定可能。納期や在庫確認等確認すべ事項が\
ある場合に指定しておくことで、チェックが可能となります。\
各計上では、確認内容と確認期日が入力できます。\
<li>	問合せ内容は「得意先情報登録」にて登録（プログラムリンク起動）\
<li>	得意先一覧ウィンドウでは、検索条件にて担当者コード指定が可能。\
<li>	伝票修正は、月次更新済の伝票等修正できない場合があります。\
<li>	メーラーおよびブラウザ起動には事前に得意先マスタに得意先毎に、得意先担当者のメールアドレス、URL、得意先住所を設定しておく必要があります。また、使用クライントにてインターネットに接続できる環境が必要です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
