<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注データをもとに、伝票単位で売上の計上を行います。受注時に明細単位で倉庫/出荷予定日/指定納期を指定した場合、得意先詳細登録にて指定された「売上一括帳端基準」の設定値と、条件指定画面で指定された「売上日付区分」の値により、受注時の明細倉庫/明細出荷予定日/明細納期から各明細を取り纏め、伝票作成します。\
<li>	ロット管理する商品については、出荷可能なロットより引き落としを行います。その際、出庫すべきロット在庫が不足している時に伝票作成を行うか否かを選択できます。\
<li>	受注時にロット指定している場合は指定ロットを、管理日付を指定している場合は指定管理日付以降のロットを引き落とします。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	出荷日付区分：伝票の出荷日を指定します。画面で入力した日付か受注時の出荷予定日を出荷日とするかを選択できます。\
<li>	売上日付区分：伝票売上日を指定します。画面で入力した日付（出荷日付区分：画面指定時のみ選択可）か、受注時の出荷予定日、売上予定日、指定納期の何れかを売上日とするかを選択できます。\
<li>	売上伝票日付が出荷予定日の場合、納期が次回の締め範囲に含まれる時、自動的に帳端区分を次回請求にスライドさせるかどうか得意先ごとに設定する事が出来ます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注時に出荷売上同時計上と指示されたデータが対象です。\
<li>	在庫引当運用を行う場合は、未引当状態の明細は対象外です。ロット在庫不足時に伝票作成する設定の場合は、未引当状態の明細は対象外となり、引当済の明細のみで伝票作成されます。\
<li>	売上一括チェックリストで一括計上の結果が確認できます。\
<li>	出荷日と売上日を別日付（出荷日<=売上日）で計上することができます。\
