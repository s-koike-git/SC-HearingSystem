function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "入金個別消込計上", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	個別債権管理を行う請求先についての消込処理です。\
<li>	「得意先詳細登録」で設定した消込区分（明細または伝票）に従って対象の伝票が表示されます。\
<li>	消込対象月の入金額で、明細物件額に対して消込みを行います。\
<li>	「回収物件履歴管理表」「未消込物件一覧表」を用いて未消込物件を 確認し、当処理で消込みを実施します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	消込対象日を指定することでその回収日の入金額および（入金額―消込額）を、対象日仮受金および対象日仮受金残として表示します。明細は回収予定日／売上伝票番号で絞り込むことが可能です。\
<li>	物件全額または一部金額を消込むことが可能です。物件残額を管理することが可能です。\
<li>	一括消込のモードでは、消込対象日の対象日仮受金が請求先回収条件にもとづく回収物件額と一致する場合、対象となる全ての物件明細を一括で消込むことが可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	物件明細に対する消込金額は、物件額の範囲内の額までしか入力することはできません。\
<li>	対象日仮受金額以上の消込みを行えます。運用時に注意が必要です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
