<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "完成計上", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	完成情報を入力／修正／削除します。\
<li>	製造指示データをもとに、完成実績を入力することができます。また、製造指示が無い、単独での完成計上も可能です。\
<br />\
<br />【製品別工数／副産物出来高入力】\
<li>	完成計上の画面から「製品別工数」「副産物情報」をクリックして呼び出されます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	明細、単位でPF7を押下することで単位別個数入力又はロット別単位別個数入力ができます。\
<li>	構成品の変更、削除が可能です。（今回のみ代替品対応した場合など）\
<li>	製造指示を仕掛'3'(多階層分割)で行った場合、製造Noに加えて枝番の入力が必須です。\
<li>	「検査：あり」と指定した場合、検査結果登録の対象になります。\
<li>	製造指示連動時、物流オプションに連動された指示情報にて原料移動が既に行われている場合は、構成品倉庫の自動変更が行えます。\
<br />\
<br />【製品別工数／副産物出来高入力】\
<li>	製品別工数の画面にて、職種ごとの工数の入力が可能です。\
<li>	副産物出来高入力の画面にて、発生した副産物の数量を入力します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	修正時、完成数の変更をした場合、構成品の再計算は行いません。\
<li>	工数管理を完成伝票毎に手入力で行う場合は、完成毎の工数を把握しておく必要があります。\
<li>	ユーザー情報管理テーブル登録の製造時区分適用「前工程完成有無チェック  １：する」の場合で、かつ、仕掛区分'3'（多階層分割）の製造指示伝票を連動した場合、下記の条件で警告メッセージが表示されます。①構成品が未完了の状態で、上位の製品を完了した場合②上位の製品が完了の状態で、下位の構成品を完了から未完了とした場合\
<li>	「検査：あり」とした場合の入庫倉庫は、事前に倉庫登録にて「倉庫区分：検査中倉庫」の倉庫を登録する必要があります。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
