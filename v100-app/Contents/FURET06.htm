<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "移動依頼計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	棚卸資産の社内移動の依頼時に使用します。\
<li>	入出庫同時の依頼をする場合に使います。\
<li>	伝票の登録／修正／削除の処理が可能です。\
<li>	倉庫別商品別及びロット別倉庫別商品別の現在庫に対して引当処理を行うことができます。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	在庫管理対象商品のみ処理可能です。\
<li>	即伝発行機能により、「移動依頼書」を出力できます。\
<li>	個数をクリックすることで、現在庫・出荷残・入荷残を照会できます。(出庫倉庫の在庫情報)\
<li>	「ロット管理（ロット№･日付）商品」または「複数単位（荷姿）設定商品」については「ロット別単位別個数入力」および「単位別個数入力」ウィンドウにて複数ロット、単位別の入力が可能です。\
<li>	在庫引当を行う商品の場合、有効在庫（現在庫－引当済数）のチェックを行い、それを上回る数量を指定した場合、メッセージを表示します。登録は可です。（伝票更新時にチェックします）\
<li>	移動の際の積送倉庫を指定可能です。指定した場合は、移動計上へ連動した際は積送(出庫)のみが指定可能となります。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注や発注および製造指示とは関連していません。\
<li>	品名の手入力はマスタ名称入力区分に関わらずできません。\
<li>	登録内容は「移動依頼日記帳」で確認できます。\
<li>	移動計上への連動が可能です。ただし依頼残管理は行いません。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
