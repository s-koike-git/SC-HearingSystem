<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\

◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	原価シミュレーションで使用する構成品の単価を試算を行う担当者毎\
に設定します。\
<li>	原価シミュレーションの原材料単価区分で「設定単価」指定時、構成品単価に当プログラムで設定した単価を初期表示されます。\

</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	明細には構成品とその仕入単価が一覧表示されます。\
<li>	掛率を設定した場合は、仕入単価×掛率の値を設定単価に表示し、設定単価は修正不可となります。\

る設定単価の仕入単価反映に伴い再計算を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
