win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	完成実績データに対する検査結果を登録します。\
<li>	検査結果の入力により、検査中倉庫の在庫から合格品を製品在庫倉庫、不良品を不良品倉庫に在庫移動させることも可能です。\
<br /><br />\
</ul></td></tr>\

◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	工場・ラインを指定し、画面の指定日付以前の完成実績データを表示します。\
<li>	完成計上にて「検査：あり」と指定した完成実績データが一覧表示されます。\
<li>	画面左側に表示された完成実績を確認し、画面右側の入力欄に検査実施日・検査後数量・検査区分（合格／不合格）を入力します。\
<li>	「数量移動：する」を指定することにより、、検査後の数量に基づき製品在庫倉庫・不良品倉庫に在庫を移動させることが可能です。\

</ul></td></tr>\
