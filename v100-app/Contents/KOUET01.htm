<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "入荷仕入計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	入荷仕入情報を入力／修正／削除します。\
<li>	発注データをもとに、入荷仕入実績を入力することができます。また、単独での仕入入力も可能です。\
<li>	仕入と同時の現金支払は計上できません。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<li>	登録時や伝票参照時に「証憑保管情報登録」をリンク起動し、登録した伝票に利用した受領文書の情報を登録・確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	仕入単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	帳端を設定する事で、支払月の調整が行えます\
<li>	明細でＰＦ７を押下することで、単位別個数入力又はロット別単位別個数入力ができます。\
<li>	仕入先別商品別の契約単価が参照可能です。ユーザー情報管理テーブルの指定により、契約単価の自動作成が可能です。\
<li>	伝票登録後、または登録済の伝票を表示している状態での証憑情報ボタン押下により「証憑保管情報登録」をリンク起動することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	発注データをもとにした場合、分納が可能です。\
<li>	仕入先別の検収リードタイムの設定より仕入日付を自動表示します。\
<br />	　入荷日＋検収リードタイム\
<br />	　入荷日付<=仕入日付の条件で変更可です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
