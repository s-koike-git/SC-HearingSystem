<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "在庫一覧表", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	月末経理在庫と当月受払を確認します。\
<li>	集計レベルで「倉庫・商品別」または「商品・倉庫別」の指定が可能です。\
<li>	在庫管理対象商品のみ印刷されます。\
<li>	在庫数量０でかつ当月受払のない商品については印字されません。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	分類計を指定することにより分類順に商品在庫が印字され、分類毎の金額計が取れます。\
<li>	倉庫コード範囲で複数倉庫を指定した場合も、倉庫別に改頁して商品在庫を印字します。\
<li>	在庫回転率は、累計売上金額÷月平均経理在庫金額で商品回転率を表示しています。\
<li>	対象在庫を選択することで、経理在庫又は、物流在庫を出力することが出来ます。\
<li>	出力単位を選択する事で基本在庫単位又は、基本荷姿単位の何れかの単位で表示します。（初期値：基本荷姿単位）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	最終仕入/月次総平均で運用している場合、評価計算前と評価計算後で当月単価が異なります（当月仕入がある場合）。計算は倉庫商品毎でなく商品で行っています。詳細はユーザーガイドの棚卸資産の評価の章や月次更新の章を参照下さい。\
<li>	出荷（入荷）／売上（仕入）別計上方式をとる場合、物流在庫選択時と経理在庫選択時で数値が異なる場合があります。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
