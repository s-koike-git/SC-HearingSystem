<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "出荷売上計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	出荷売上情報を入力／修正／削除します。\
<li>	受注データをもとに、出荷売上実績を入力することができます。また、単独での売上入力も可能です。\
<li>	現金売上の場合には、入金情報を作成しています。別途に入金計上する必要はありません。\
<li>	得意先別の契約単価が参照可能です。\
<li>	「預り区分」を１と指定することにより、預り売上伝票を処理します。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	マスタの設定により、得意先及び納・ 品先、商品の名称等手入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	売上単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	確認ウィンドウで、即時伝票発行が可能です。\
<li>	帳端を設定する事で、請求月の調整が行えます。\
<li>	「ロット№別在庫一覧」ウィンドウで、ロット別在庫の参照が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注データをもとにした場合、分納が可能です。\
<li>	引当処理を行っている場合、未引当の受注データは表示されません。\
<li>	見出しと明細に異なる倉庫を指定することができますが、仮納品書などの伝票単位出荷情報は見出し倉庫で出力判断します。\
<li>	出荷日と売上日を別日付（出荷日<=売上日）で計上することができます。\
<li>	得意先別の売上計上基準（出荷基準or検収基準、検収LT）の設定より売上予定日を自動表示します。（日付変更可）得意先の計上基準による売上日の初期値\
<br />	　出荷基準の場合：出荷日\
<br />	　検収基準の場合：納品日＋得意先マスタの検収LT\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
