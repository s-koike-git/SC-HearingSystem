<tr><td class='t1'>\

<li>	表示対象を「回収物件履歴」にした場合、対象年月／部門／請求先を指定することで指定月以前の滞留物件額（未消込部件額）を回収予定月別に確認できます。\

<li>	「現在物件残高」は「当月以降請求分」～「4ヶ月以上前請求分」の合計値です。\
<li>	「当月仮受金残」欄には対象年月の入金額のうち、物件と未突合わせの入金額を出力しています。\
