win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	工場、開始製造日を指定して、生産計画データを週間で一覧表示し、計画数の調整を行います。製造ライン、開始商品コードを入力することにより明細表示の絞り込みができます。\
<li>	調整された生産計画を確定させることにより、次の「製造指示データ作成」へ連動できます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	計画数および仕掛区分の登録、修正、追加が行なえます。\
<li>	1週間分の日付は、工場別カレンダーマスタを参照して、休日であれば日付を赤字で表示します。\
<li>	商品毎に調整前と調整後の週間計を表示します。\
<li>	計画数および仕掛区分の修正、追加が可能です。\
<li>	製品の生産計画の新規作成も可能です。\
<li>	F11、12キーにより、画面に表示されている製品の前週・翌週の生産計画を確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	確定区分は、取込時点（未調整）で「9:未処理」になっています。これを「1:確定済」にすることにより、製造指示データ作成の対象となります。製造指示データ作成済の生産計画データは、「連携済」となり、計画数の変更は不可になります。連携後の修正は、「製造指示入力」にて行います。\
<li>	「週間生産計画一覧表」を出力して調整内容を確認できます。\
<br /><br />\
</ul></td></tr>\
