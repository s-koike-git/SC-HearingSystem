function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "移動依頼完了計上", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	倉庫別に「有形取引の移動残」のキャンセルをします。\
<li>	ユーザー情報管理テーブルで引当を行うとしていた場合、引当残のキャンセルも同時に行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	出庫倉庫／入庫倉庫／日付区分／対象日付／移動依頼番号／表示区分を指定する事により、移動依頼情報を表示します。\
<li>	得意先／店が指定されたら、該当のものが表示され店が省略されたら、全ての店の分が表示されます。\
<li>	表示区分は全件もしくは未完了が指定できます。全件を指定した場合は既に移動完了済の移動依頼伝票が表示されます。未完了を指定した場合には残分のみが表示されます。\
<li>	日付区分は出庫依頼日／入庫予定日から選択が可能です。対象日付は日付区分で選択した日付となり、絞り込み対象は移動依頼見出し(移動依頼計上のヘッダー部指定)の出庫予定日／入庫予定日が対象です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	完了指示（移動依頼キャンセル）は伝票単位に行います。移動処理がされている伝票は現在区分に連携済と表示されます。\
<br /><br />\
</ul></td></tr>\

win.showCenter();
