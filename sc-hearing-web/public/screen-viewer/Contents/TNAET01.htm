<tr><td class='t1'>\
<ul>\
<li>	棚卸の準備を行います。\

</ul></td></tr>\

◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

<li>	棚卸処理方法では全社一斉棚卸と倉庫一斉棚卸、部分棚卸を指定することができます。（同一日付30行まで）\
<li>	全社一斉棚卸を指定した場合には、棚卸範囲の指定を行うことはできません。\
<li>	倉庫一斉棚卸を指定した場合には、棚卸範囲の指定を行うことはできません。\

<li>	同一棚卸範囲を確定（棚卸確定更新）する前に、（棚卸日付を違えたとしても）同一範囲を指定して準備処理を行うことはできません。\
