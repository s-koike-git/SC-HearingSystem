<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	画面で指定した集計項目に対する純売上金額または粗利金額(当月・累計)を金額順に把握します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	累計項目の算出期間を指定できます。\
<li>	集計項目に指定したマスタの汎用項目を絞り込んで出力することが出来ます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	得意先・商品については、各マスタに順位表の出力対象と設定された分のみ出力されます。\
<li>	構成比率は、部門抽出や分類抽出などに関わらず、全社売上または粗利高に占める比率です。そのため、構成比の合計は出力対象範囲\
の指定によっては必ずしも100%とはなりません。\
<li>	集計項目には下記が指定可能です。\
<br />	「得意先」、「商品」、「得意先・商品」、「得意先・店」、「部門」、「担当者」、「担当者・得意先」、「担当者・商品」、「担当者・得意先・商品」\
<li>	集計項目が複数指定された場合、先頭のマスタ要素に対して汎用項目の絞り込みを行います。\
<br /><br />\
</ul></td></tr>\
