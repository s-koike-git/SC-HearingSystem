<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "ユーザー情報管理テーブル登録", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	ユーザー自社情報の設定を行います。また、データの保存期間などの運用要件を設定します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【ユーザ情報１】\
<li>	自社の基本的な回収条件・支払条件を設定しておくと得意先・仕入先の情報設定が省力化できます。（参照元となりますが、当画面の変更が当社基準通りに設定した全口座に反映するわけではありません）\
<br />\
<br />【ユーザ情報３】\
<li>	製造・原価管理業務に関する設定を行います。\
<br />\
<br />【ユーザ情報４】\
<li>	販売及び購買計上画面の項目に対してカーソル移動区分を設定します。計上画面で運用上使用しない項目に対して「スキップする」と設定することで、伝票入力時の入力負荷が軽減されます。\
<li>	計上方式を設定します。\
<br />\
<br />【ユーザ情報５】\
<li>	預り取引、引当運用に関する設定を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【ユーザー情報１】\
<li>	データ保存期間に関してはユーザーガイドの月次更新の章を参照下さい。\
<br />\
<br />【ユーザー情報３】\
<li>	システムを販売管理として使用する場合は不要です。\
<br />\
<br />【ユーザー情報４】\
<li>	カーソル移動区分「スキップする」と設定した場合も、バックタブやマウス操作での該当項目の選択は可能です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
