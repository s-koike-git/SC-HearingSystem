◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	CSV/Excelから受注受付データを取り込み、受注受付伝票を作成します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	商品コードについては、自社品番の他に「相手品番」でのデータ取込が出来ます。\
<li>	ファイルの取込処理と、取り込んだデータを参照して実行される実績データ作成処理を分割して実行することも出来ます。\
<li>	指定条件情報のみを登録し、BPKickerからデータ取込・データ作成も可能です。\
<li>	Excelファイルの取込を行う際は、取込データの開始行を指定することが可能です。\
<li>	取込データは得意先コード・相手先伝票No・受注受付日付単位で１つの伝票に\
まとまります。\
<li>	取込エラー発生時はエラー内容をログファイルで確認することができます。\
<li>	データ作成時にエラーが発生した伝票は１伝票単位で更新キャンセルとなります。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	取込対象となるデータを、指定のファイル形式（CSV/Excel）に変換しておく必要があります。\
<li>	ファイルの保存先は変更できません。設定は事前に「ユーザー情報管理テーブル登録」にて行います。対象フォルダー内にあるファイルを全て処理します。\
<li>	新規データの取り込みと修正データの取込みを行うことができます。\
ただし、既に仮伝票以降が作成されているデータについては修正はできません。\
<li>	データ取り込み後に伝票を削除したい場合には、計上プログラムを使用してください。\
<br /><br />\
</ul></td></tr>\

win.showCenter();
