<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "仕入計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	仕入情報を入力／修正／削除します。\
<li>	発注データ／入荷データをもとに、仕入実績を入力することができます。また、単独での仕入入力も可能です。\
<li>	単独での計上時には、在庫管理商品の数量入力を行うことはできません。\
<li>	仕入と同時の現金支払は計上できません。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<li>	登録時や伝票参照時に「証憑保管情報登録」をリンク起動し、登録した伝票に利用した受領文書の情報を登録・確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	マスタの設定により、仕入先及び商品の名称等手入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	仕入単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	帳端を設定する事で、支払月の調整が行えます。\
<li>	仕入先別商品別の契約単価が参照可能です。\
<li>	ユーザー情報管理テーブルの指定により、契約単価の自動作成が可能です。\
<li>	伝票登録後、または登録済の伝票を表示している状態での証憑情報ボタン押下により\
「証憑保管情報登録」をリンク起動することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	入荷連動での仕入時、入荷の元となった発注に在庫対象外の明細がある場合には、発注時の在庫対象外の明細も一画面に表示されます。\
<li>	発注連動での仕入時には、在庫対象外の明細のみが表示されます。有形取引明細の仕入は入荷連動でのみ計上が可能です。\
<li>	入荷データをもとにした場合、分割仕入が可能です。\
<li>	サービス取引についての残管理は、仕入有無で判断しています。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
