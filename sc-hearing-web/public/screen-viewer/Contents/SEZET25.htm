◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

<li>	明細の製品・半製品の価値に応じて構成品を配賦可能とするため、按分係数の指定が可能です。\
<li>	１明細につき１枚の完成伝票として登録されます。\
<li>	完成品（製品）に「販売用商品コード」が設定されているとき、完成数（在庫単位数）は「販売用商品」の在庫として繰り入れられます。\

</ul></td></tr>\

<li>	ロット情報は構成品、製品・半製品ともに１つのみ指定可能です。\
