<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	お客様におけるデータ出力を支援します。\
<li>	当機能では、「自由帳票リスト設定の簡易版定義」及び「自由帳票出力（簡易版）のカスタム設定」で設定された情報を元にしたデータ出力と、「自由帳票リスト設定の簡易版定義」を元にしたデータ出力の個人用リスト設定を行ないます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【データ抽出】\
<li>	「簡易版定義」が登録されている「リスト」の条件に基づき、データの抽出を行います。\
<li>	データ抽出の際の出力形式は、以下の５形式から選択することが出来ます。\
<br />	　　　「グリッド（当機能上にて画面表示）」「EXCEL帳票」「EXCELブック」「CSV形式」「XML形式」\
<li>	「リスト」に設定された条件以外に、「リスト」で設定した画面条件の条件項目で抽出条件を指定することが出来ます。\
<br />\
<br />【グリッド】\
<li>	「データ抽出」にて「出力：”グリッド”」が指定された際、条件に基づき抽出された明細データをグリッド表示します。\
<br />\
<br />【カスタム設定】\
<li>	「自由帳票リスト設定の簡易版定義」で登録された情報から、データ出力の個人用リスト設定を行ないます。ここで登録された情報は全て個人用リストとして保存されます。変更可能な情報は「出力項目（出力可否、並び順）」「出力順」「画面条件」「Excel帳票出力設定」となります。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【カスタム設定】\
<li>	個人用のリストを設定した場合は、必ず「リストを保存して反映」を押下し設定情報を登録してください。登録後、設定したリスト情報で出力が可能です。\
<li>	基となるリスト設定にて、Excel帳票出力設定の帳票テンプレートを設定していた場合は「テンプレート取得」を押下し、簡易版専用の帳票テンプレートフォルダに設定基テンプレートをコピーしてください。\
<br /><br />\
