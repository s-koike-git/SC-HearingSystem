<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "完成計上（複数版）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【完成計上（複数版）】\
<li>	製品・半製品が複数入力可能な完成情報の入力画面です。\
<li>	複数の構成品から、製品・半製品が複数できる連産品の入力に対応します。\
<li>	製造指示入力（複数版）で行った製造指示書に対する完成実績の入力が可能です。\
<li>	製造指示が無い、単独での完成実績の入力も可能です。\
<li>	当画面では、「製品・半製品」の完成出来高を入力します。\
<li>	「完成計上入力（複数版）」画面から呼び出されます。\
<li>	発生した副産物の数量を入力します。\
<br />\
<br />【完成計上（複数版）（構成品）】\
<li>	「完成計上入力（複数版）」画面から呼び出されます。\
<li>	連産品の製造に伴う構成品使用実績の入力を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【完成計上（複数版）】\
<li>	明細に完成実績入力対象となる複数の製品・半製品を入力します。\
<li>	事前に登録した製造パターンを呼び出すことで、登録済みの製品・半製品の一覧を明細に展開することも可能です。\
<li>	構成品の使用実績入力は、ツールバー「構成品情報」から起動される「完成計上（複数版）（構成品）」画面にて行います。\
<li>	サブ画面で中間親情報の確認が可能です。\
<li>	製品別・職種別の工数実績入力が可能です。\
<li>	「検査：あり」と指定した場合、検査結果登録の対象になります。\
<li>	「製品別工数」はユーザー情報管理テーブル登録の 「工数按分区分」が「0:適用なし」かつ種別「1:連産品」とした場合のみ 表示可能です。\
<li>	製造指示連動時、物流オプションに連動された指示情報にて原料移動が既に行われている場合は、構成品倉庫の自動変更が行えます。\
<br />\
<br />【完成計上（複数版）（構成品）】\
<li>	「完成計上（複数版）」画面で指定した製品・半製品の製造に必要な構成品が明細に展開されます。使用実績の入力や、代替品を使用した場合の明細追加・削除を行います。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<br />【完成計上（複数版）】\
<li>	「検査：あり」とした場合の入庫倉庫は、事前に倉庫登録にて「倉庫区分：検査中倉庫」の倉庫を登録する必要があります。\
<li>	種別を選択することで以下の処理が行えます。\
<br />「1:連産品」\
<br />\t　パターン登録にて登録された連産品の新規完成処理\
<br />\t　製造指示入力（複数版）にて登録された連産品指示の完成処理\
<br />「2:単票纏め」\
<br />\t　複数製品の新規一括完成処理\
<br />\t　製造指示入力にて登録された指示の一括完成処理\
<li>	種別「1:連産品」を指定した場合は、登録には「構成品情報」が登録されている必要があります。\
<br />\
<br />【完成計上（複数版）（構成品）】\
<li>	構成に含まれていない構成品を追加することが可能です。\
追加した構成品の明細にて「対象製品・半製品コード」を指定することで、\
特定の製品・半製品のみに追加することが可能です。空白とした場合、\
「完成計上（複数版）」にて入力されている製品・半製品の全てで\
使用することとなり、それぞれの在庫単位数量にて構成品使用数を\
按分します。\
<li>	「完成計上（複数版）」にて種別「1:連産品」を指定した場合のみ表示可能です。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
