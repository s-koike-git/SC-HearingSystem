<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\

◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	セット商品の在庫振替（加工／分解）に使用します。分解はマイナス入力処理です。\
<li>	伝票の登録／修正／削除の処理が可能です。\
<li>	事前に設定するセット品の構成製品情報に基づいて振替を行います。(ボディ部は構成マスタ登録順表示）\
<li>	構成品の商品コードﾞや(使用)個数は変更できません。（ロスなどに関しては出庫計上で、構成変更に関しては別セット商品設定や個別商品販売、などの運用になり ます）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	ボディ部倉庫コードにヘッダ部と異なる倉庫コードを入力した場合は移動(伝票)計上と同様の処理が自動的になされ、移動後にセット振替がなされた形になります。\
<li>	伝票発行機能はありません。\
<li>	ヘッド個数をクリックすることで、セット品の在庫情報が参照できます。\
<li>	「ロット管理（ロット№･日付）商品」または「複数単位（荷姿）設定商品」\
については「ロット別単位別個数入力」および「単位別個数入力」ウィ\
ンドウにて複数ロット、単位別の入力が可能です。\
<li>	ロット別詳細入力にて、Ｆ５キーによりロット別在庫マスタが参照可能で\
す。（現在庫数が0より大きいものを表示）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注や発注とは関連していません。セット加工指示書により加工を実施し、加工結果を入力します。\
<li>	品名の手入力はマスタ名称入力区分に関わらずできません。\
<li>	現品票（タックシール）の出力機能があります。\
<br /><br />\
</ul></td></tr>\
