<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "直送受注計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	直送受注情報を入力／修正／削除します。\
<li>	受発注情報を一度に作成します。\
<li>	倉庫在庫より出荷する場合には、「受注計上」にて行います。\
<li>	他の注文/見積を参照して設定したい場合は参照注文/見積№を直接入力するか、注文/見積№一覧ウィンドウより検索して画面表示することができます。\
<li>	確認ウィンドウで、即時伝票（注文書）発行が可能です。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<li>	登録時や伝票参照時に「証憑保管情報登録」をリンク起動し、登録した伝票に利用した受領文書の情報を登録・確認することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウからの検索入力が可能です。\
<li>	マスタの設定により、得意先及び納品先、仕入先、商品の名称等手入力が可能です。\
<li>	受注／発注単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	得意先別商品別の契約単価が参照可能です。\
<li>	ユーザー情報管理テーブルの設定により、契約単価の自動作成が可能です。\
<li>	伝票登録後、または登録済の伝票を表示している状態での証憑情報ボタン押下により「証憑保管情報登録」をリンク起動することができます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	オンライン情報ウィンドウで表示される内容は得意先店毎に登録されている内容です。\
<li>	得意先別の計上基準（出荷基準or検収基準、検収LT）の設定より売上予定日（=仕入予定日）を自動表示します。（日付変更可）\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
