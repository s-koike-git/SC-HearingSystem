function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "部門制御登録", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	ログインユーザーに対してデータ閲覧／更新を許可する部門を設定します。\
<li>	以下の部門を設定することで、業務ごとに設定した部門以下の階層に紐づくデータのみ閲覧／更新が可能となります。\
<br />	　・得意先担当者部門：販売管理業務（出荷を除く）\
<br />	　・仕入先担当者部門：購買管理業務（入荷を除く）\
<br />	　・債権管理部門：請求売掛業務\
<br />	　・債務管理部門：支払買掛業務\
<br />	　・在庫管理部門：在庫管理業務（入荷・出荷を含む）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	パターンコード「00000000」で登録した部門制御レコードがシステムで使用されます。\
<li>	組織変更に備えてパターンコード「00000000」以外のレコードを事前に作成しておき、\
「表示中のパターンを現行パターンに差し替え」を行うことで、\
パターンコード「00000000」のレコードを上書きします。\
<li>	既存のパターンをコピーして、新しいパターンを参照作成可能です。\
<li>	パターンコード「00000000」は削除不可です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	部門の階層の設定は、「部門体系登録」にて行います。\
<li>	部門を設定しない業務については、全ての部門のデータが閲覧／更新可能です。\
<li>	当画面で未登録のオペレータについては、全ての部門のデータが閲覧／更新可能です。\
<li>	部門制御を有効にするためには、当画面の設定に加えて、「ユーザー情報管理テーブル登録で「部門制御：有効」の設定が必要です。\
<br /><br />\
</ul></td></tr>\

win.showCenter();
