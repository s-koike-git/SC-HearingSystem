◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	在庫管理商品について、発注数の確定を支援するため、倉庫・商品別に現在庫、入荷予定、出荷予定およびマスタ情報（仕入先、担当者、倉庫、商品）を抽出し、日付別の予定在庫、発注数を算出するExcelテンプレートファイルへ連動します。\
<li>	Excelでは、商品毎の発注点（適正在庫）、発注情報（発注ロット、発注リードタイム）および予定在庫より、必要発注数を自動算出します。発注数、入荷倉庫、仕入先をメンテナンスすることができます。修正、確定したExcelファイルより、SCの発注データへ連携が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	Excel出力対象の範囲は、処理日（システム日付）から最大3週間です。週毎に指定します。商品区分や商品分類の他に、商品マスタに任意に指定できる発注サイクルコードにて範囲を絞り込むことができます。\
<li>	倉庫別に予定在庫を表示するか指定できます。 \
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

<li>	連動するExcelテンプレートはデータ連携用に作成されたものです。\
<li>	処理が完了すると、完成したExcelファイルが保存されます。Excelファイルの起動は、メッセージ表示される保存フォルダより別途起動します。\
<br /><br />\
</ul></td></tr>\
