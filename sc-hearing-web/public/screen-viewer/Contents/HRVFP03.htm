<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "物件サマリ整合処理", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	個別管理を行っている運用形態での非常時対処用のシステムサポータ用ツールです。\
<li>	画面から入力された年月以降に回収する伝票と入金(仮受金)を再集計します。(会計年月での指定)\
<li>	左図では2018/08月度(会計月度)の回収予定日を持つ売上伝票と、2018/08月度(会計月度)の入金伝票日付の入金伝票を対象に、物件データ集計(回収予定会計月度での集計)データを再作成します。物件集計データをリカバリ対象としており物件トランは処理されません。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	また、消込トランからの消込再更新も集計データに対して行われます。この時も物件集計データを対象としており、物件トランの物件毎の残額は変更されません。\
<li>	テーブルの誤消去、破壊等の不慮の事故で利用できる場合があるという程度の再集計のみの機能ツールです。（いかなる場合でも全ての帳簿を整合する様に復旧するというツールではありません）\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	データ状況を正確に把握のうえ、お使い下さい。非常時対処用ですので、月次締の進行チェックなど一切していません。\
<li>	未消込物件一覧表が正しく、売掛物件年齢管理表や回収物件年齢管理表ベースと整合とれない様なデータ状況の時に有効です。逆に売上から物件を発生させる処理や消込で物件更新を再処理する必要ある場合は、適合しないツールです。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
