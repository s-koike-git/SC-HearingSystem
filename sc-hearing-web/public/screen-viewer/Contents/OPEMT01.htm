<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

<li>	パスワードを登録する場合、パスワード欄でF5キーを押下するとパスワード入力画面が表示されます。\
<li>	パスワード入力画面にて「ユーザは初回ログイン時にパスワードの変更が必要」\

必要となります。\
<br /><br />\

<li>	本プログラムを操作中の管理者のIDは一覧画面で修正できません。「処理」－「接続中のユーザ変更」の画面で名称／パスワードの更新が可能です。\
<li>	更新結果（成否）は画面表示されません。実行後に「ユーザID更新履歴確認表」を出力して確認してください。\
<br /><br />\
