function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "出荷計上（Core販売）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	出荷情報を入力／修正／削除します。\
<li>	受注データを元に出荷実績を入力することができます。また、単独での出荷計上も可能です。\
<li>	在庫管理対象商品のみ処理可能です。受注データより参照した場合にはサービス取引（非在庫管理商品）は表示されません。\
<li>	「商品詳細登録」のロット№管理区分：１の場合、ロットＮｏの入力は必須となります。\
<li>	「預り区分」を９と指定することにより、預り出庫伝票を処理します。\
<li>	スーパーカクテルCore販売ライセンスで利用可能です。\
<li>	預り取引・店・帳合先に非対応です。\
<li>	明細項目の倉庫・出荷予定日に非対応です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	サブフォームにて、受注時の単位（荷姿）とは別単位で入力することが可能です。\
<li>	「ロット管理（ロット№･日付）商品」または「複数単位（荷姿）設定商品」については「ロット別単位別個数入力」および 「単位別個数入力」ウィンドウにて複数ロット、単位別の入力が可能です。\
<li>	「ロット別単位別個数入力」ウィンドウでＦ５の検索キーを押すことによ り、ロット別在庫の参照が可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	受注データを元にした場合、分納が可能です。\
<li>	出荷売上計上との併用はできません。\
<li>	引当処理を行っている場合、未引当の受注データは表示されません。\
<li>	見出しと明細に異なる倉庫を指定することができますが、仮納品書などの伝票単位出荷情報は見出し倉庫で出力判断します。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
