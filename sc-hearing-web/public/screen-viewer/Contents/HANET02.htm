<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "売上計上（Core FOODs）", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	売上情報を入力／修正／削除します。\
<li>	受注データ／出荷データをもとに、売上実績を入力することができます。また、単独での売上入力も可能です。\
<li>	単独での計上時には、在庫管理商品の数量入力を行うことはできません。\
<li>	現金売上の場合には、入金情報を作成しています。別途に入金計上する必要はありません。\
<li>	得意先別の契約単価が参照可能です。\
<li>	スーパーカクテルCore FOODs販売ライセンスで利用可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	伝票№は手入力、自動採番が設定可能です。\
<li>	各種コードは検索ウィンドウから検索入力が可能です。\
<li>	マスタの設定により、得意先及び納品先、商品の名称等手入力が可能です。\
<li>	個数をクリックすることで、現在庫／出荷残／入荷残を照会できます。\
<li>	売上単価をクリックすることで、過去５回迄の取引単価が参照できます。\
<li>	確認ウィンドウで、即時伝票発行が可能です。\
<li>	帳端を設定する事で、請求月の調整が行えます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	出荷連動での売上時、出荷の元となった受注にサービス取引明細がある場合には、受注時のサービス明細も一画面に表示されます。\
<li>	受注連動での売上時には、サービス取引明細のみが表示されます。有形取引明細の売上は出荷連動でのみ計上が可能です。\
<li>	出荷データをもとにした場合、分割売上が可能です。\
<li>	サービス取引についての残管理は、売上有無で判断しています。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
