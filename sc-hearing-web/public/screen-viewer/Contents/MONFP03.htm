<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "月次原価洗替更新", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	ユーザー情報定義の原単価算出区分(売上計上時の原単価)・棚卸評価単価区分が共に最終仕入、総平均および移動平均の場合に、売上計上時の原単価を月末評価計算単価に置換し、販売統計上の再集計を行う処理です。\
<li>	評価計算と同じく同月度で複数回実行できます。また計上時の原単価に戻す機能をもっていますが、運用制限を下記備考に示しています。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	棚卸評価方法が&quot;移動平均&quot;の場合、「ユーザー情報管理テーブル登録」の「洗替適用区分」の設定値により、洗い替え元となる評価単価の値が異なってきます。\
<br />	「洗替適用区分」\
<br />	　＝「月末評価単価」：対象月度末日の移動平均単価にて、\
月度内全伝票明細の原単価（原価金額）を洗い替えます。\
<br />	　＝「日別評価単価」：各伝票の伝票日付から対象となる移動平均\
単価導出日の評価単価を参照し、明細の原単価を洗い替え\
ます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	洗替更新を一旦行った場合、売上伝票修正を行わない(伝票追加は可能です)様な運用統制を行わないと複数回実行で原価が異常になる場合があります。\
<li>	単価区分が上記条件を満たさない場合に警告エラーとなります。洗替運用区分がOFFも同様です。\
<li>	年月は評価計算と同じ扱いです。入力は慎重に行って下さい。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
