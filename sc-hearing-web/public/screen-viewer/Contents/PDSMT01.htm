<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\

◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	オペレータIDごとにPDF分割及びAirRepo連携の設定を登録します。\
<li>	利用区分によって、スーパーカクテルの帳票プログラムに対しての設定か、\

<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	帳票IDではPRフレームが指定可能です。\
<li>	AirRepo連携機能はAirRepoライセンスが必要となります。\
<br />	AirRepo連携「1：連携する」とした場合は、下記の設定とする必要があります。\
<br />	PDF名称区分　「1：帳票ID」\
<br />	PDF分割区分　「1：分割する」\
<br />	PDF分割キー　「指定する項目の項目長が13桁以内」\
<li>	PDF分割キーは対象の帳票ワーク項目（数値・繰返項目以外）を指定可能です。\
<li>	発行管理「1：管理する」とした場合でも、対象プログラムにて\
発行管理に対応していない場合は管理されません。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	プログラムIDではPRフレーム／MTフレームが指定可能ですが、MTフレームで対応しているプログラムは以下となります。\
<br />	「HANMT11_納品書発行(一覧選択)」\
<br />	「SEKMT11_請求書発行(一覧選択)」\
<br />	「VSKMT11_請求書発行(一覧選択)」\
<br /><br />\
</ul></td></tr>\
