function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "原価計算", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	対象年月を指定して行います。\
<li>	工場コードを指定することにより、特定の工場のみで原価計算を行うことが可能です。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	締区分で「1：仮締する」とした場合、原価に必要な情報（完成計上・工数入力・労務費入力・経費入力）の各計上の最終更新日を参照し、データ整合性に問題がないかチェックします。問題がある場合、処理を中断します。\
<li>	締区分で「０：仮締しない」とした場合は、データの整合性チェックは行いません。従って月中時点での原材料費のみ（経費、労務費未登録）での原価計算が可能です。\
<li>	月次更新前であれば何度でも実行する事が出来ます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	工場を複数範囲で指定する場合、その範囲内の特定工場は対象外としたい場合、「工場別仮締解除処理」で未締めを仮締めに変更することができます。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
