win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	請求準備処理を行った請求先に対して、請求準備処理を解除します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	明細確認指定時は、請求準備処理を行った請求先を一覧表示して、\
請求先ごとに解除の実施を行うことができます。\
<li>	指定範囲一斉時は、範囲指定に合致する請求先を一括で解除を行います。\
<li>	解除（締め直前の状態へ戻す）は、最終締日から順（締日毎）に戻します。\
<li>	消費税の算出方法が請求一括の請求先の場合、\
準備処理で算出した消費税を無効にします。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	請求準備処理を実施すると請求対象伝票修正は行えなくなりますが、伝票漏れなどによる伝票追加登録や修正が必要になった場合は当処理を実施することで請求準備状態が解除されます。\
<li>	請求準備解除後、再度請求準備処理を行うことで請求番号の請求番号枝番はカウントアップします。\
<li>	処理対象は最終締日が合致する請求先です。\
<li>	解除したい請求先が一覧に表示されない場合には、得意先詳細登録で最終締日付を確認できます。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
