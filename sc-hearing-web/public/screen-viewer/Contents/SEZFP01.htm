function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "生産計画データ取込", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	決められたＣＳＶまたはEXCEL形式で作成された生産計画のデータを取り込むことによって生産計画の作成を行ないます。\
<li>	取込時各マスタを参照して、マスタ存在チェックを行います。ただし、工場カレンダーマスタの休日はチェックを行いません。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	月間もしくは週ベースでの取込を行い、日別の計画に割り振ることが出来ます。\
<li>	正常に取り込めた場合のみ、ファイルの名前を変更して退避します。\
<li>	実行後、画面に処理件数、取込み件数、エラー件数を表示します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	取込み対象となる生産計画のデータを指定のファイル形式に変換しておく必要があります。\
<li>	生産計画データは、工場コード、製造ラインコード、製造日、商品コードで一意制約があります。同じ条件のデータを2回取込んだ場合、次業務の確定処理（製品別生産計画調整入力での確定区分）までは無条件に上書きされます。\
<li>	取込んだ結果は「生産計画取込結果一覧表」で確認出来ます。\
<li>	取込んだデータを「製品別生産計画調整入力」にて修正を行なう事が出来ます。\
<br /><br />\
</ul></td></tr>\

win.showCenter();
