<script>
function showtable() {
var win = new Window({className: "alphacube", width:422, height:400, zIndex: 500, resizable: true, title: "原価シミュレーション", draggable:true, wiredDrag: true})
win.getContent().innerHTML ="\
<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\
<tr align='center' ><td class='t0'>\
◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	既存マスタに依存しない構成品や単価設定での試算原価を画面対話形式で確認します。\
<li>	売上金額と製造原価より粗利益および利益率を確認できます。売上単価は変更可能です。\
<li>	経費・労務費の設定で、科目に固定費と変動費を設定することで、原価利益、損益分岐点の確認が可能です。\
<li>	生産活動を通して付加された価値と総工数より労働生産性を確認\
できます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	見出部で工場・参照月度・対象ファイル等を指定することにより、実績データから製品の構成情報・生産数が取得可能です。\
<li>	販売用商品コードを使用している場合、製品コードへ変換します。変換された製品には“*”が表示されます。\
<li>	構成情報が未登録の場合は製品コードが赤文字で表示されます。\
<li>	製品毎に直接賦課経費を設定できます。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　備　　考　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	試算番号の項目にてF5押下で試算管理番号一覧ウィンドウが起動\
されます。\
<li>	経費・労務費項目にてF5押下で各入力がプログラムリンクで起動さ\
れます。\
<li>	明細部の製品コードまたは生産数にてF8押下で構成登録がプログ\
ラムリンクで起動されます。\
<li>	直接賦課経費の項目にてF5押下で入力画面が表示されます。固定経費と変動経費を設定できます。\
<li>	標準工数の項目にてF5押下で入力画面が表示されます。\
<br /><br />\
</ul></td></tr>\
</table>";
win.showCenter();
}
</script>
