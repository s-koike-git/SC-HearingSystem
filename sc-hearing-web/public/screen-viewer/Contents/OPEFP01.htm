<table width='404px' cellpadding='2' cellspacing='0' style='position:relative;' align='left'>\

◆◇◆◇　処理概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\
<ul>\
<li>	システムのログインID、パスワードをCSVファイルから取込、一括で登録します。また、現在登録されているユーザIDの一覧をCSVファイルに出力します。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\
◆◇◆◇　機能概要　◇◆◇◆\
</td></tr>\
<tr><td class='t1'>\

<li>	エクスポートを選択すると、現在登録されているユーザIDの一覧を指定したCSVファイルに出力します。\
<li>	インポートを選択すると、指定したCSVファイルからユーザIDを取込、新規登録・修正・削除を行います。\
<li>	「ユーザは初回ログイン時にパスワードの変更が必要」\
にチェックを入れると、設定後の対象ユーザ初回ログイン時にパスワード変更が\
必要となります。\
<br /><br />\
</ul></td></tr>\
<tr align='center'><td class='t1'>\

</td></tr>\
<tr><td class='t1'>\
<ul>\

<li>	更新結果（成否）は画面表示されません。実行後に「ユーザID更新履歴確認表」を出力して確認して下さい。\
<br /><br />\
</ul></td></tr>\
